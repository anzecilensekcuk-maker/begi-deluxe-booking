<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const SERVICES = [
  { id:"strizenje", name:"Striženje", price:15, duration:40, icon:"✂️" },
  { id:"strizenje_brada", name:"Striženje + Brada", price:20, duration:55, icon:"💈" },
  { id:"skin_fade", name:"Skin Fade Deluxe", price:20, duration:50, icon:"🔥" },
  { id:"vip", name:"VIP Paket", desc:"Striženje + Brada + Styling", price:30, duration:70, icon:"👑" },
];
const WORK_HOURS = { start:10, end:19 };
const WORK_DAYS = [1,2,3,4,5];
const PHONE_DISPLAY = "031 236 541";
const ADMIN_PIN = "1234";
const SLOT_INTERVAL = 30;
const STORAGE_KEY = "begi-deluxe-bookings";
const TG_TOKEN = "8670560691:AAHSxjxvqGCmzHq1X7JT67GlSlQEdLZKooE";
const TG_CHAT_ID = "5629446369";

const gold="#D4AF37",goldLight="#F5D76E",dark="#0A0A0A",darkCard="#141414",darkBorder="#222";

function fmtDate(d){return d.toISOString().split("T")[0]}
function dayName(d){return d.toLocaleDateString("sl-SI",{weekday:"short"})}
function longDate(d){return d.toLocaleDateString("sl-SI",{weekday:"long",day:"numeric",month:"long"})}
function isWorkDay(d){return WORK_DAYS.includes(d.getDay())}
function getNext14(){const o=[];let d=new Date();d.setDate(d.getDate()+1);while(o.length<14){if(isWorkDay(d))o.push(new Date(d));d.setDate(d.getDate()+1)}return o}
function genSlots(dur){const s=[];for(let m=WORK_HOURS.start*60;m+dur<=WORK_HOURS.end*60;m+=SLOT_INTERVAL){s.push(`${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`)}return s}
function timeToMin(t){const[h,m]=t.split(":").map(Number);return h*60+m}
function minToTime(m){return`${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`}

async function sendTG(text){try{await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:TG_CHAT_ID,text,parse_mode:"Markdown"})})}catch(e){console.error("TG:",e)}}

function loadB(){try{const d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):{}}catch{return{}}}
function saveB(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));return true}catch{return false}}

function App(){
  const[step,setStep]=useState(0);
  const[service,setSvc]=useState(null);
  const[date,setDate]=useState(null);
  const[time,setTime]=useState(null);
  const[name,setName]=useState("");
  const[phone,setPhone]=useState("");
  const[bookings,setBk]=useState({});
  const[loading,setLoad]=useState(true);
  const[anim,setAnim]=useState(false);
  const[done,setDone]=useState(false);
  const[isBooking,setIsB]=useState(false);
  const[showAdmin,setSA]=useState(false);
  const[adminAuth,setAA]=useState(false);
  const[adminPin,setAP]=useState("");
  const ref=useRef(null);

  useEffect(()=>{setBk(loadB());setLoad(false)},[]);

  const go=(s)=>{setAnim(true);setTimeout(()=>{setStep(s);setAnim(false);ref.current?.scrollTo({top:0,behavior:"smooth"})},200)};

  const isSlotTaken=useCallback((dateObj,timeStr,dur)=>{
    const ds=fmtDate(dateObj),startM=timeToMin(timeStr);
    for(let m=startM;m<startM+dur;m+=SLOT_INTERVAL){if(bookings[`${ds}_${minToTime(m)}`])return true}
    return false;
  },[bookings]);

  const handleBook=async()=>{
    if(!name.trim()||!phone.trim()||isBooking)return;
    setIsB(true);const ds=fmtDate(date),startM=timeToMin(time),latest=loadB();
    for(let m=startM;m<startM+service.duration;m+=SLOT_INTERVAL){
      if(latest[`${ds}_${minToTime(m)}`]){alert("Ta termin je bil pravkar zaseden.");setBk(latest);setIsB(false);go(3);return}
    }
    const bk={service:service.id,serviceName:service.name,name:name.trim(),phone:phone.trim(),price:service.price,duration:service.duration,bookedAt:new Date().toISOString()};
    for(let m=startM;m<startM+service.duration;m+=SLOT_INTERVAL){latest[`${ds}_${minToTime(m)}`]=m===startM?bk:{blocked:true,parentKey:`${ds}_${time}`}}
    saveB(latest);setBk(latest);
    await sendTG(`💈 *NOVA REZERVACIJA*\n\n👤 *${name.trim()}*\n📱 ${phone.trim()}\n✂️ ${service.name} — ${service.price}€\n📅 ${longDate(date)}\n🕐 ${time}\n⏱ ${service.duration} min`);
    setDone(true);setIsB(false);go(5);
  };

  const handleCancel=async(key)=>{
    const latest=loadB(),bk=latest[key];if(!bk||bk.blocked)return;
    const ds=key.split("_")[0],startM=timeToMin(key.split("_")[1]);
    for(let m=startM;m<startM+(bk.duration||40);m+=SLOT_INTERVAL){delete latest[`${ds}_${minToTime(m)}`]}
    saveB(latest);setBk(latest);
    const d=new Date(ds+"T12:00:00");
    await sendTG(`❌ *ODPOVED*\n\n👤 ${bk.name}\n🕐 ${key.split("_")[1]}\n📅 ${longDate(d)}`);
  };

  const dates=getNext14();

  if(loading)return(<div style={{minHeight:"100vh",background:dark,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24}}><img src={LOGO_SRC} alt="Logo" style={{width:80,height:80,borderRadius:"50%",objectFit:"cover"}}/><div style={{width:120,height:2,background:"#222",borderRadius:1,overflow:"hidden"}}><div style={{height:"100%",background:`linear-gradient(90deg,${gold},${goldLight})`,animation:"barLoad 1.5s ease forwards"}}/></div></div>);

  if(showAdmin){
    if(!adminAuth)return(
      <div style={S.container} ref={ref}>
        <Header onAdmin={()=>setSA(false)} isAdmin/>
        <div style={{...S.content,paddingTop:40,textAlign:"center"}}>
          <h2 style={S.stepTitle}>Admin prijava</h2>
          <p style={{color:"#666",fontSize:14,marginBottom:24}}>Vnesi PIN</p>
          <input style={{...S.input,maxWidth:200,textAlign:"center",margin:"0 auto",display:"block",letterSpacing:8,fontSize:24}} type="password" maxLength={4} value={adminPin} onChange={e=>setAP(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&adminPin===ADMIN_PIN)setAA(true)}} placeholder="• • • •" autoFocus/>
          <button style={{...S.ctaBtn,marginTop:24,opacity:adminPin.length===4?1:0.4}} disabled={adminPin.length!==4} onClick={()=>{if(adminPin===ADMIN_PIN)setAA(true);else{setAP("");alert("Napačen PIN")}}}>PRIJAVA</button>
        </div>
      </div>
    );
    const entries=Object.entries(bookings).filter(([_,v])=>!v.blocked).sort(([a],[b])=>a.localeCompare(b));
    const grouped={};entries.forEach(([k,v])=>{const d=k.split("_")[0];if(!grouped[d])grouped[d]=[];grouped[d].push({key:k,...v,time:k.split("_")[1]})});
    return(
      <div style={S.container} ref={ref}>
        <Header onAdmin={()=>{setSA(false);setAA(false);setAP("")}} isAdmin/>
        <div style={S.content}>
          <div style={{...S.stepHeader,paddingTop:24}}><div style={S.stepInfo}><span style={{fontSize:28}}>⚙️</span><h2 style={S.stepTitle}>Admin panel</h2></div></div>
          <button style={{...S.resetBtn,marginBottom:20}} onClick={()=>setBk(loadB())}>🔄 OSVEŽI</button>
          {Object.keys(grouped).length===0?<div style={{textAlign:"center",padding:40}}><p style={{color:"#555"}}>Ni rezervacij.</p></div>
          :Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).map(([ds,items])=>{
            const d=new Date(ds+"T12:00:00");
            return(<div key={ds} style={{marginBottom:24}}>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:gold,margin:"0 0 12px",fontWeight:700}}>{longDate(d)}</h3>
              {items.sort((a,b)=>a.time.localeCompare(b.time)).map(it=>(
                <div key={it.key} style={S.adminCard}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{color:gold,fontWeight:700,fontSize:16,fontFamily:"'Playfair Display',serif"}}>{it.time}</span>
                      <span style={{color:"#666"}}>·</span>
                      <span style={{color:"#bbb",fontSize:13}}>{it.serviceName}</span>
                      <span style={{color:gold,fontSize:13,fontWeight:600}}>{it.price}€</span>
                    </div>
                    <div style={{display:"flex",gap:12,fontSize:12,color:"#666",flexWrap:"wrap"}}>
                      <span>👤 {it.name}</span><span>📱 {it.phone}</span><span>⏱ {it.duration}min</span>
                    </div>
                  </div>
                  <button style={S.cancelBtn} onClick={()=>{if(confirm(`Odpoveš ${it.name} ob ${it.time}?`))handleCancel(it.key)}}>✕</button>
                </div>
              ))}
            </div>)
          })}
        </div>
      </div>
    );
  }

  return(
    <div style={S.container} ref={ref}>
      <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,rgba(212,175,55,0.03) 0%,transparent 50%,rgba(212,175,55,0.05) 100%)",pointerEvents:"none"}}/>
      <Header onAdmin={()=>setSA(true)}/>
      <div style={{...S.content,opacity:anim?0:1,transform:anim?"translateY(10px)":"none",transition:"all 0.22s ease"}}>

        {step===0&&(
          <div style={{paddingTop:32,animation:"fadeUp 0.5s ease"}}>
            <div style={S.heroCard}>
              <div style={S.heroGlow}/>
              <img src={LOGO_SRC} alt="Deluxe Barber" style={{width:100,height:100,borderRadius:"50%",objectFit:"cover",margin:"0 auto 24px",display:"block",position:"relative",border:`2px solid ${gold}`}}/>
              <h2 style={S.heroTitle}>Naroči se<br/><span style={S.heroGold}>online</span></h2>
              <p style={S.heroDesc}>Izberi storitev, termin in potrdi.<br/>Hitro. Preprosto. Brez čakanja.</p>
              <button style={S.ctaBtn} onClick={()=>go(1)} onMouseEnter={e=>{e.target.style.background=`linear-gradient(135deg,${gold},${goldLight})`;e.target.style.color="#000"}} onMouseLeave={e=>{e.target.style.background="transparent";e.target.style.color=gold}}>REZERVIRAJ TERMIN</button>
            </div>
            <div style={S.infoGrid}>
              {[["📍","Ločica ob Savinji"],["🕐","Pon–Pet · 10:00–19:00"],["📱",PHONE_DISPLAY],["💎","VIP service available"]].map(([i,t],n)=>(
                <div key={n} style={S.infoItem}><span style={{fontSize:18}}>{i}</span><span style={S.infoTxt}>{t}</span></div>
              ))}
            </div>
          </div>
        )}

        {step===1&&(
          <div>
            <StepHead n="01" t="Izberi storitev" back={()=>go(0)}/>
            <div style={S.svcGrid}>
              {SERVICES.map(s=>(
                <button key={s.id} style={{...S.svcCard,...(service?.id===s.id?S.svcActive:{})}} onClick={()=>{setSvc(s);setTimeout(()=>go(2),250)}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:24}}>{s.icon}</span>
                    <span style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:gold}}>{s.price}€</span>
                  </div>
                  <h3 style={{fontSize:15,fontWeight:600,margin:0,color:"#eee"}}>{s.name}</h3>
                  {s.desc&&<p style={{fontSize:11,color:"#666",margin:0}}>{s.desc}</p>}
                  <p style={{fontSize:12,color:"#555",margin:0}}>{s.duration} min</p>
                </button>
              ))}
            </div>
          </div>
        )}

        {step===2&&(
          <div>
            <StepHead n="02" t="Izberi datum" back={()=>go(1)}/>
            <Tags svc={service}/>
            <div style={S.dateGrid}>
              {dates.map((d,i)=>{const sel=date&&fmtDate(date)===fmtDate(d);return(
                <button key={i} style={{...S.dateCard,...(sel?S.dateActive:{}),animationDelay:`${i*25}ms`}} onClick={()=>{setDate(d);setTimeout(()=>go(3),200)}}>
                  <span style={S.dateDay}>{dayName(d)}</span>
                  <span style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:sel?"#000":"#fff"}}>{d.getDate()}</span>
                  <span style={{fontSize:10,color:sel?"#000":"#555"}}>{d.toLocaleDateString("sl-SI",{month:"short"})}</span>
                </button>
              )})}
            </div>
          </div>
        )}

        {step===3&&service&&date&&(
          <div>
            <StepHead n="03" t="Izberi uro" back={()=>go(2)}/>
            <Tags svc={service} d={date}/>
            <div style={S.timeGrid}>
              {genSlots(service.duration).map(t=>{const taken=isSlotTaken(date,t,service.duration),sel=time===t;return(
                <button key={t} disabled={taken} style={{...S.timeCard,...(taken?S.timeTaken:{}),...(sel?S.timeActive:{})}} onClick={()=>{if(!taken){setTime(t);setTimeout(()=>go(4),200)}}}>
                  <span style={{fontSize:16,fontWeight:600,color:taken?"#444":sel?"#000":"#ddd"}}>{t}</span>
                  {taken&&<span style={{fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:1}}>zasedeno</span>}
                </button>
              )})}
            </div>
          </div>
        )}

        {step===4&&(
          <div>
            <StepHead n="04" t="Tvoji podatki" back={()=>go(3)}/>
            <Tags svc={service} d={date} tm={time}/>
            <div style={S.form}>
              <div style={S.inputWrap}><label style={S.label}>Ime in priimek</label><input style={S.input} placeholder="npr. Janez Novak" value={name} onChange={e=>setName(e.target.value)} onFocus={e=>e.target.style.borderColor=gold} onBlur={e=>e.target.style.borderColor="#333"}/></div>
              <div style={S.inputWrap}><label style={S.label}>Telefonska številka</label><input style={S.input} placeholder="npr. 031 123 456" value={phone} onChange={e=>setPhone(e.target.value)} onFocus={e=>e.target.style.borderColor=gold} onBlur={e=>e.target.style.borderColor="#333"} type="tel"/></div>
              <button style={{...S.bookBtn,opacity:name.trim()&&phone.trim()&&!isBooking?1:0.4}} disabled={!name.trim()||!phone.trim()||isBooking} onClick={handleBook}>{isBooking?"POŠILJAM...":"POTRDI NAROČILO"}</button>
              <p style={{fontSize:12,color:"#444",textAlign:"center"}}>Obvestilo bo avtomatsko poslano frizerju</p>
            </div>
          </div>
        )}

        {step===5&&done&&(
          <div style={{textAlign:"center",paddingTop:48,animation:"fadeUp 0.5s ease"}}>
            <div style={S.checkCircle}>✓</div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,margin:"0 0 24px"}}>Naročilo potrjeno!</h2>
            <div style={S.confirmBox}>
              {[["Storitev",service?.name],["Datum",date&&longDate(date)],["Ura",time],["Cena",`${service?.price}€`]].map(([l,v],i)=>(
                <div key={l}>{i>0&&<div style={{height:1,background:darkBorder,margin:"4px 0"}}/>}<div style={{display:"flex",justifyContent:"space-between",padding:"8px 0"}}><span style={{fontSize:13,color:"#666"}}>{l}</span><span style={{fontSize:14,color:l==="Cena"?gold:"#ddd",fontWeight:l==="Cena"?700:500}}>{v}</span></div></div>
              ))}
            </div>
            <div style={{marginTop:20,padding:"14px 20px",background:"rgba(46,204,113,0.1)",border:"1px solid rgba(46,204,113,0.2)",borderRadius:14}}><p style={{fontSize:13,color:"#2ecc71",margin:0}}>✅ Frizer je bil obveščen prek Telegram-a</p></div>
            <p style={{fontSize:13,color:"#555",marginTop:16}}>Vidimo se! 💈</p>
            <button style={S.resetBtn} onClick={()=>{setStep(0);setSvc(null);setDate(null);setTime(null);setName("");setPhone("");setDone(false);setBk(loadB())}}>NOVA REZERVACIJA</button>
          </div>
        )}
      </div>
      <footer style={S.footer}>
        <div style={{height:1,background:`linear-gradient(90deg,transparent,${darkBorder},transparent)`,marginBottom:20}}/>
        <p style={{fontSize:12,color:"#444",fontWeight:500,letterSpacing:2,margin:0}}>DELUXE BARBER · Ločica ob Savinji</p>
        <p style={{fontSize:10,color:"#333",margin:"4px 0 0"}}>© 2026</p>
      </footer>
    </div>
  );
}

function Header({onAdmin,isAdmin}){return(
  <header style={S.header}>
    <div style={{display:"flex",alignItems:"center",gap:14,flex:1}}>
      <img src={LOGO_SRC} alt="Logo" style={{width:44,height:44,borderRadius:12,objectFit:"cover",border:`1.5px solid ${gold}`}}/>
      <div><h1 style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,margin:0,letterSpacing:3}}>DELUXE BARBER</h1><p style={{fontSize:11,color:"#666",margin:0,letterSpacing:1}}>Premium grooming · Ločica ob Savinji</p></div>
    </div>
    <button onClick={onAdmin} style={S.adminToggle}>{isAdmin?"✕":"⚙️"}</button>
  </header>
)}

function StepHead({n,t,back}){return(<div style={S.stepHeader}><button style={S.backBtn} onClick={back}>← Nazaj</button><div style={S.stepInfo}><span style={S.stepNum}>{n}</span><h2 style={S.stepTitle}>{t}</h2></div></div>)}

function Tags({svc,d,tm}){return(<div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>{svc&&<span style={S.tag}>{svc.icon} {svc.name} · {svc.price}€</span>}{d&&<span style={S.tag}>📅 {d.toLocaleDateString("sl-SI",{day:"numeric",month:"short"})}</span>}{tm&&<span style={S.tag}>🕐 {tm}</span>}</div>)}

const S={
  container:{minHeight:"100vh",background:dark,color:"#fff",fontFamily:"'Outfit',sans-serif",position:"relative",overflow:"hidden"},
  content:{padding:"0 20px 32px",minHeight:"60vh"},
  header:{display:"flex",alignItems:"center",padding:"20px 20px 16px",borderBottom:`1px solid ${darkBorder}`},
  adminToggle:{background:"none",border:`1px solid ${darkBorder}`,borderRadius:10,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:16,color:"#666"},
  heroCard:{position:"relative",padding:"40px 28px 48px",borderRadius:20,background:`linear-gradient(160deg,${darkCard},#1a1a1a)`,border:`1px solid ${darkBorder}`,textAlign:"center",overflow:"hidden",marginBottom:24},
  heroGlow:{position:"absolute",top:-60,right:-60,width:200,height:200,background:"radial-gradient(circle,rgba(212,175,55,0.12),transparent 70%)",pointerEvents:"none"},
  heroTitle:{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:900,margin:"0 0 16px",lineHeight:1.15,position:"relative"},
  heroGold:{background:`linear-gradient(135deg,${gold},${goldLight})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"},
  heroDesc:{fontSize:15,color:"#888",lineHeight:1.6,margin:"0 0 32px",fontWeight:300,position:"relative"},
  ctaBtn:{position:"relative",padding:"16px 40px",background:"transparent",border:`2px solid ${gold}`,borderRadius:60,color:gold,fontSize:14,fontWeight:700,letterSpacing:3,cursor:"pointer",fontFamily:"'Outfit',sans-serif",transition:"all 0.3s"},
  infoGrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10},
  infoItem:{display:"flex",alignItems:"center",gap:10,padding:"14px 16px",background:darkCard,borderRadius:14,border:`1px solid ${darkBorder}`},
  infoTxt:{fontSize:13,color:"#bbb"},
  stepHeader:{paddingTop:24,paddingBottom:8,display:"flex",flexDirection:"column",gap:12},
  backBtn:{background:"none",border:"none",color:"#666",fontSize:13,cursor:"pointer",fontFamily:"'Outfit',sans-serif",padding:0,textAlign:"left"},
  stepInfo:{display:"flex",alignItems:"baseline",gap:12},
  stepNum:{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:900,color:gold,opacity:0.3},
  stepTitle:{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,margin:0},
  tag:{padding:"6px 14px",background:"rgba(212,175,55,0.1)",borderRadius:20,fontSize:12,color:gold,border:"1px solid rgba(212,175,55,0.2)",fontWeight:500},
  svcGrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:16},
  svcCard:{background:darkCard,border:`1px solid ${darkBorder}`,borderRadius:18,padding:"20px 16px",textAlign:"left",cursor:"pointer",transition:"all 0.25s",fontFamily:"'Outfit',sans-serif",display:"flex",flexDirection:"column",gap:6},
  svcActive:{borderColor:gold,background:"rgba(212,175,55,0.08)",boxShadow:"0 0 24px rgba(212,175,55,0.12)"},
  dateGrid:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginTop:16},
  dateCard:{background:darkCard,border:`1px solid ${darkBorder}`,borderRadius:14,padding:"14px 4px",textAlign:"center",cursor:"pointer",transition:"all 0.2s",display:"flex",flexDirection:"column",gap:4,fontFamily:"'Outfit',sans-serif",animation:"fadeUp 0.3s ease both"},
  dateActive:{borderColor:gold,background:`linear-gradient(160deg,rgba(212,175,55,0.15),rgba(212,175,55,0.05))`,boxShadow:"0 0 20px rgba(212,175,55,0.1)"},
  dateDay:{fontSize:10,color:"#666",fontWeight:500,textTransform:"uppercase",letterSpacing:1},
  timeGrid:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginTop:16},
  timeCard:{background:darkCard,border:`1px solid ${darkBorder}`,borderRadius:14,padding:"16px 8px",textAlign:"center",cursor:"pointer",transition:"all 0.2s",fontFamily:"'Outfit',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",gap:4},
  timeTaken:{opacity:0.35,cursor:"not-allowed",background:"#0d0d0d"},
  timeActive:{borderColor:gold,background:"rgba(212,175,55,0.1)",boxShadow:"0 0 20px rgba(212,175,55,0.1)"},
  form:{marginTop:20,display:"flex",flexDirection:"column",gap:16},
  inputWrap:{display:"flex",flexDirection:"column",gap:6},
  label:{fontSize:12,color:"#777",fontWeight:500,letterSpacing:0.5},
  input:{background:darkCard,border:"1px solid #333",borderRadius:14,padding:"16px 18px",color:"#fff",fontSize:15,fontFamily:"'Outfit',sans-serif",outline:"none",transition:"border-color 0.2s"},
  bookBtn:{padding:"18px 32px",background:`linear-gradient(135deg,${gold},${goldLight})`,border:"none",borderRadius:60,color:"#000",fontSize:14,fontWeight:700,letterSpacing:3,cursor:"pointer",fontFamily:"'Outfit',sans-serif",marginTop:8,transition:"all 0.2s"},
  checkCircle:{width:72,height:72,borderRadius:"50%",background:`linear-gradient(135deg,${gold},${goldLight})`,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:36,color:"#000",fontWeight:700,marginBottom:20,animation:"checkPop 0.5s ease"},
  confirmBox:{background:darkCard,border:`1px solid ${darkBorder}`,borderRadius:20,padding:"24px 20px",textAlign:"left"},
  resetBtn:{marginTop:24,padding:"14px 32px",background:"transparent",border:`1px solid #333`,borderRadius:60,color:"#888",fontSize:12,fontWeight:600,letterSpacing:2,cursor:"pointer",fontFamily:"'Outfit',sans-serif"},
  adminCard:{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:darkCard,border:`1px solid ${darkBorder}`,borderRadius:14,marginBottom:8},
  cancelBtn:{background:"rgba(220,50,50,0.15)",border:"1px solid rgba(220,50,50,0.3)",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",color:"#e55",fontSize:14,cursor:"pointer",flexShrink:0},
  footer:{padding:"24px 20px 32px",textAlign:"center"},
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
